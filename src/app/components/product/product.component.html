<div class="container mt-4">
  <div class="row row-cols-1 row-cols-md-3 g-4">
    @for (product of ProductList; track product.id) {
      <div class="col">
        <div class="card h-100 shadow-sm">
          <img [src]="product.thumbnail" class="card-img-top p-3" [alt]="product.title" style="height: 250px; object-fit: contain;" />
          <div class="card-body">
            <h5 class="card-title">{{ product.title | uppercase }}</h5>
            <p class="card-text text-muted">Price: {{ product.price | currency }}</p>
          </div>
        </div>
      </div>
    } @empty {
      <div class="col-12 text-center">
        <h3>Loading Products...</h3>
      </div>
    }
  </div>
</div>
