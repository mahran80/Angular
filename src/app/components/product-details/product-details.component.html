<div class="container mt-4">
  @if (productInfo) {
    <div class="card shadow-sm border-0">
      <div class="row g-0">
        <div class="col-md-5">
          <img [src]="productInfo.Img" class="img-fluid rounded-start" [alt]="productInfo.Name" style="height: 100%; object-fit: cover;">
        </div>
        
        <div class="col-md-7">
          <div class="card-body p-5">
            <h2 class="card-title mb-3">{{ productInfo.Name }}</h2>
            <h4 class="text-primary mb-4">Price: {{ productInfo.Price | currency:'EGP':'symbol':'1.0-0' }}</h4>
            <p class="fs-5 text-muted">Quantity available in stock: <strong>{{ productInfo.Quantity }}</strong></p>
            
            <hr class="my-4">
            
            <button class="btn btn-secondary px-4" routerLink="/products">
                Back to Products
            </button>
          </div>
        </div>
      </div>
    </div>
  } @else {
    <div class="alert alert-danger text-center p-5 shadow-sm">
      <h3 class="text-danger">Product Not Found!</h3>
      <p class="text-muted">The product you are looking for does not exist in our system.</p>
      <button class="btn btn-dark mt-3" routerLink="/products">Back to Products</button>
    </div>
  }
</div>
