<div class="container mt-4">
  <h2>Search Products</h2>
  
  <div class="d-flex gap-2 mb-4">
    <input type="text" class="form-control" [(ngModel)]="keyword" placeholder="Search for products (e.g., phone)...">
    <button class="btn btn-primary" (click)="search()">Search</button>
  </div>

  <div class="row row-cols-1 row-cols-md-3 g-4">
    @for (product of searchResults; track product.id) {
      <div class="col">
        <div class="card h-100 shadow-sm">
          <img [src]="product.thumbnail" class="card-img-top p-3" [alt]="product.title" style="height: 200px; object-fit: contain;" />
          <div class="card-body">
            <h5 class="card-title">{{ product.title }}</h5>
            <p class="card-text text-muted">Price: {{ product.price | currency }}</p>
            <p class="card-text">{{ product.description }}</p>
          </div>
        </div>
      </div>
    } @empty {
      <div class="col-12 text-center text-muted">
        <p>No products found. Type a keyword and press Search.</p>
      </div>
    }
  </div>
</div>
